name: Agente Antigravity Diario
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - setup-python:
          python-version: '3.9'
      - run: pip install yfinance requests
      - run: python agente.py
      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add index.html
          git commit -m "Update" || echo "No changes"
          git push --force
