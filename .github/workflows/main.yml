name: Agente Antigravity Diario
on:
  schedule:
    - cron: '30 13 * * *' # Se ejecuta 1h antes de Wall Street
  workflow_dispatch:      # Botón para ejecutarlo manualmente ahora

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run Agent
        run: python agente.py
